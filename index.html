<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <meta charset="UTF-8">
        <title>Blackjack!</title>
    </head>
    <body>
        <div id="bg-color">
            <div>
                <h1>Blackjack</h1> 
            </div> 
            <div>
                <p id="message-el">Bir el oynamak ister misiniz?</p>
                <p id="dealer-hand-el">Krupiyenin eli:</p>
                <p id="dealer-sum-el">Krupiyenin kartlarının toplamı:</p>
                <p id="cards-el">Eliniz:</p>
                <p id="sum-el">Kartlarınızın toplamı:</p>
            </div>
            <div>
                <button id="start-game-btn-el" onclick="startGame()">OYUNA BAŞLA</button>
                <button onclick="newCard()">ÇEK</button>
                <button onclick="stand()">KAL</button>
            </div>
            <div>
                <p id="player-el"></p>
            </div>
            <div id="betting-section">
                <p id="bet-amount-el">Bahis miktarınızı giriniz:</p>
                <input type="number" id="bet-input" placeholder="Miktar:" min="1">
                <button onclick="placeBet()">BAHİS VER</button>
                <p id="bet-status-el"></p>
            </div>
            <script src="index.js"></script>
        </div>
    </body>
</html>
