<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <meta charset="UTF-8">
        <title>Blackjack!</title>
    </head>
    <body>
        <div id="bg-color">
            <div>
                <h1>Blackjack</h1> 
            </div> 
            <div>
                <p id="message-el">Want to play a round?</p>
                <p id="dealer-hand-el">Dealer's hand:</p>
                <p id="dealer-sum-el">Dealer's sum:</p>
                <p id="cards-el">Your cards:</p>
                <p id="sum-el">Your sum:</p>
            </div>
            <div>
                <button id="start-game-btn-el" onclick="startGame()">START GAME</button>
                <button onclick="newCard()">HIT</button>
                <button onclick="stand()">STAND</button>
            </div>
            <div>
                <p id="player-el"></p>
            </div>
            <div id="betting-section">
                <p id="bet-amount-el">Enter your bet amount:</p>
                <input type="number" id="bet-input" placeholder="Bet amount:" min="1">
                <button onclick="placeBet()">PLACE BET</button>
                <p id="bet-status-el"></p>
            </div>
            <script src="index.js"></script>
        </div>
    </body>
</html>
